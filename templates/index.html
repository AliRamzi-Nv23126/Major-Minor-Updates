<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
</head>
<body>
    <h1>ToDo List</h1>
    <a href="{{ url_for('add') }}">Add Task</a>
    <ul>
        {% for task in tasks %}
        <li>
            {{ task.title }} - {{ 'Done' if task.done else 'Pending' }}
            <a href="{{ url_for('edit', id=task.id) }}">Edit</a>
            <a href="{{ url_for('delete', id=task.id) }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
