<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
</head>
<body>
    <h1>ToDo List</h1>
    <form method="GET">
        <input type="text" name="q" value="{{ q }}" placeholder="Search tasks...">
        <input type="submit" value="Search">
    </form>
    <a href="{{ url_for('add') }}">Add Task</a>
    <ul>
        {% for task in tasks %}
        <li>
            <strong>{{ task.title }}</strong> - {{ task.status }} - Priority: {{ task.priority }}
            {% if task.due_date %}
            - Due: {{ task.due_date }}
            {% endif %}
            {% if task.description %}
            <br>Description: {{ task.description }}
            {% endif %}
            <br>
            <a href="{{ url_for('edit', id=task.id) }}">Edit</a>
            <a href="{{ url_for('delete', id=task.id) }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
